spring:
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver


  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
        format_sql: true
    show-sql: false
    open-in-view: false

#  data:
#    redis:
#      host: localhost
#      port: 6379
   

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: default
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true
      # If using Lettuce (default in Spring Boot 3), you may need this for SSL
      lettuce:
        extension:
          use-ssl: true
server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
  ride:
    corridor-radius-meters: 5000
  google:
    geolocation-api-key: # Optional: Add your Google Geolocation API key for WiFi-accuracy location

logging:
  level:
    com.campusride: DEBUG
    org.hibernate.SQL: WARN
