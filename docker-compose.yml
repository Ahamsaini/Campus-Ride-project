version: "3.8"

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: campusride-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: campusride-redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data:
